[build]
  command = "npm run build"
  publish = "apps/dashboard/dist"

# SPA fallback — let React Router handle all routes.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# The widget is embedded on third-party sites; allow cross-origin loading
# and cache it briefly so settings changes propagate quickly.
[[headers]]
  for = "/widget.js"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=300"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
